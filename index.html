<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Pormamilla</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f4f4;
}

header{
background:linear-gradient(135deg,#0066ff,#00bfff);
color:white;
padding:25px;
text-align:center;
}

.search{
padding:15px;
}

.search input{
width:100%;
padding:12px;
font-size:18px;
border-radius:10px;
border:none;
box-sizing:border-box;
}

.categories{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:15px;
}

.cat{
background:white;
padding:18px;
border-radius:12px;
text-align:center;
font-size:18px;
font-weight:bold;
box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.card{
background:white;
margin:15px;
padding:20px;
border-radius:15px;
box-shadow:0 3px 10px rgba(0,0,0,.2);
}

button{
background:#16a34a;
color:white;
padding:10px 18px;
border:none;
border-radius:8px;
font-size:16px;
}
</style>

</head>

<body>

<header>
<h1>📍 My Pormamilla</h1>
<p>Everything in Pormamilla at One Place</p>
</header>

  <div class="search">
<input type="text" placeholder="🔍 Search Shops, Hotels, Banks...">
</div>

<div class="<a href="https://www.google.com/maps/search/?api=1&query=Bank+near+me" target="_blank" style="text-decoration:none;">
    <div class="cat" style="background:#1565C0;color:white;">
        🏦 Banks Near Me
    </div>
</a>

<a href="https://www.google.com/maps/search/?api=1&query=Hospital+near+me" target="_blank" style="text-decoration:none;">
    <div class="cat" style="background:#E53935;color:white;">
        🏥 Hospital Near Me
    </div>
</a>

<a href="https://www.google.com/maps/search/?api=1&query=Hotel+near+me" target="_blank" style="text-decoration:none;">
    <div class="cat" style="background:#FB8C00;color:white;">
        🍽 Hotels Near Me
    </div>
</a>

<a href="https://www.google.com/maps/search/?api=1&query=Medical+Shop+near+me" target="_blank" style="text-decoration:none;">
    <div class="cat" style="background:#43A047;color:white;">
        💊 Medical Near Me
    </div>
</a>

<a href="https://www.google.com/maps/search/?api=1&query=Petrol+Pump+near+me" target="_blank" style="text-decoration:none;">
    <div class="cat" style="background:#F4511E;color:white;">
        ⛽ Petrol Near Me
    </div>
</a>

</body>
</html>
