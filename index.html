<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Kalasapadu</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f4f4;
}

header{
background:linear-gradient(135deg,#0066ff,#00bfff);
color:white;
padding:25px;
text-align:center;
}

.search{
padding:15px;
}

.search input{
width:100%;
padding:12px;
font-size:18px;
border-radius:10px;
border:none;
box-sizing:border-box;
}

.categories{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:15px;
}

.cat{
background:white;
padding:18px;
border-radius:12px;
text-align:center;
font-size:18px;
font-weight:bold;
box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.card{
background:white;
margin:15px;
padding:20px;
border-radius:15px;
box-shadow:0 3px 10px rgba(0,0,0,.2);
}

button{
background:#16a34a;
color:white;
padding:10px 18px;
border:none;
border-radius:8px;
font-size:16px;
}
</style>

</head>

<body>

<header>
<h1>📍 My Kalasapadu</h1>
<p>Everything in Kalasapadu at One Place</p>
</header>

<div class="search">
<input type="text" placeholder="🔍 Search Shops, Hotels, Banks...">
</div>

<div class="categories">
<div class="cat">🏦 Banks</div>
<div class="cat">🏥 Hospital</div>
<div class="cat">🍽 Hotels</div>
<div class="cat">💊 Medical</div>
<div class="cat">🚌 Bus Stand</div>
<div class="cat">⛽ Petrol</div>
</div>

</body>
</html>
