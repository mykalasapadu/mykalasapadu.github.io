<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Kalasapadu</title>
<style>
body{
font-family:Arial,sans-serif;
margin:0;

}

color:white;
padding:20px;

}
.card{

margin:15px;
padding:15px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.2);
}
button{
background:#28a745;
color:white;
padding:10px 15px;
border:none;
border-radius:5px;
}
a{
text-decoration:none;
}
</style>
</head>
<body>

<header>
<h1>My Kalasapadu</h1>
<p>Find Shops, Hotels, Hospitals & More</p>
</header>

<div class="card">
<h2>Kalasapadu Bus Stand</h2>
<p>Main Bus Stand, Kalasapadu</p>
<a href="https://www.google.com/maps/dir/?api=1&destination=Kalasapadu+Bus+Stand,+Andhra+Pradesh" target="_blank">
<button>Open Map</button>
</a>
</div>

<div class="card">
<h2>Medical Shop</h2>
<p>Kalasapadu</p>
<a href="https://maps.google.com" target="_blank">
<button>Open Map</button>
</a>
</div>

</body>
</html>
